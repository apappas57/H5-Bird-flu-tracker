name: Assisted curation (agentic v0)

# Human-gated agent: drafts avian-influenza records from official bulletins and
# opens a PR for review. It never publishes directly — you merge the PR.
#
# Enable: add an ANTHROPIC_API_KEY repo secret (Settings → Secrets → Actions).
# Without it, the agent is a clean no-op.
on:
  workflow_dispatch:
  schedule:
    - cron: "23 7 * * 1"   # weekly, Monday 07:23 UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  curate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Draft curated records from official bulletins
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CURATE_MODEL: claude-sonnet-5
        run: node agents/curate.mjs

      - name: Sanity-check the pipeline still builds with the proposals
        run: node pipeline/build.mjs

      - name: Open a review PR (only if there are new proposals)
        uses: peter-evans/create-pull-request@v6
        with:
          branch: agent/assisted-curation
          delete-branch: true
          add-paths: pipeline/curated.json
          title: "Assisted curation: proposed avian-flu records for review"
          body-path: agents/out/summary.md
          labels: |
            agentic
            needs-review
          commit-message: "data(curated): assisted-curation proposals [skip ci]"
