name: Daily data refresh

# The repo is connected to Vercel, so any push to main triggers a production
# deploy (which re-runs pipeline/build.mjs and pulls fresh data). This job runs
# the pipeline once a day and commits the refreshed data, which triggers that
# deploy. It is fully self-contained: no deploy hook or external secret needed.

on:
  schedule:
    - cron: "17 6 * * *"   # daily, 06:17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Refresh data from live sources
        run: node pipeline/build.mjs

      - name: Commit refresh marker (triggers the Vercel deploy, which rebuilds the full data)
        run: |
          # Only summary.json is committed daily to keep git history lean; Vercel
          # regenerates the large detections.json fresh at build time from this push.
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/data/summary.json
          if git diff --cached --quiet; then
            echo "No changes today."
          else
            git commit -m "chore: daily data refresh"
            git push
          fi
