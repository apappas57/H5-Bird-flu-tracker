name: Refresh data & deploy

on:
  # Refresh the data once a day (06:17 UTC). Agencies update on weekday afternoons US time.
  schedule:
    - cron: "17 6 * * *"
  # Deploy on code changes (but ignore the bot's own data commits to avoid loops).
  push:
    branches: [main]
    paths-ignore:
      - "site/data/**"
  workflow_dispatch:

permissions:
  contents: write   # commit refreshed data back to the repo
  pages: write      # deploy to GitHub Pages
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest data from official sources
        run: node pipeline/build.mjs

      - name: Commit refreshed data (if changed)
        run: |
          git config user.name "h5-tracker-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/data
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "chore(data): scheduled refresh [skip ci]"
            git push
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deploy
        uses: actions/deploy-pages@v4
